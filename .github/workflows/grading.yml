name: Grade Assignment

on:
  workflow_dispatch:

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存関係をインストール
        run: npm ci

      - name: データベースを起動
        run: |
          docker compose -f db/docker-compose.yml up -d --wait

      - name: 採点を実行
        id: grade
        run: npx jest --no-coverage --verbose 2>&1 | tee grade_result.txt
        continue-on-error: true

      - name: PRを検索してコメントを追加
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ github.ref_name }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const fs = require('fs');

            // 採点結果を読み込み
            let result = '採点結果の取得に失敗しました';
            try {
              if (fs.existsSync('grade_result.txt')) {
                result = fs.readFileSync('grade_result.txt', 'utf8');
              }
            } catch (e) {
              console.log('結果ファイルの読み込みに失敗:', e);
            }

            // ブランチ名に対応するPRを検索
            let prNumber = null;
            try {
              const { data: pulls } = await github.rest.pulls.list({
                owner,
                repo,
                head: owner + ':' + branch,
                state: 'open'
              });

              if (pulls.length > 0) {
                prNumber = pulls[0].number;
              } else {
                const { data: allPulls } = await github.rest.pulls.list({
                  owner,
                  repo,
                  state: 'open'
                });
                const found = allPulls.find(pr => pr.head.ref === branch);
                if (found) {
                  prNumber = found.number;
                }
              }
            } catch (e) {
              console.log('PR検索エラー:', e);
            }

            if (!prNumber) {
              core.warning('ブランチ "' + branch + '" に対応するオープンなPRが見つかりませんでした。');
              return;
            }

            const comment = '## 📊 採点結果\n\n' +
              '**ブランチ**: `' + branch + '`\n\n' +
              '```\n' +
              result +
              '\n```\n\n' +
              '---\n' +
              'このコメントは自動採点システムによって追加されました。';

            try {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: comment
              });
              core.notice('PR #' + prNumber + ' にコメントを追加しました。');
            } catch (e) {
              core.error('PR #' + prNumber + ' へのコメント追加に失敗: ' + e.message);
            }

      - name: 採点結果をSummaryに出力
        if: always()
        run: |
          echo "## 📊 採点結果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**ブランチ**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f grade_result.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat grade_result.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "詳細はログを確認してください。" >> $GITHUB_STEP_SUMMARY
          fi
